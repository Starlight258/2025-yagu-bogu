name: Mirror to personal repo

# 팀 원본 레포(upstream)의 hardening + topic/* 브랜치만
# 개인 미러 레포로 복제해서 잔디를 채운다.
on:
  schedule:
    # cron은 UTC 기준. KST 오전 8시 = UTC 전날 23시
    - cron: '0 23 * * *'
  workflow_dispatch:  # GitHub Actions 탭에서 수동 실행도 가능

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror upstream branches to personal repo
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          set -e

          UPSTREAM="https://github.com/woowacourse-teams/2025-yagu-bogu.git"
          MIRROR="https://x-access-token:${MIRROR_TOKEN}@github.com/Starlight258/yagubogu-mirror.git"

          # 작업용 빈 저장소 준비
          git init work
          cd work
          git remote add upstream "$UPSTREAM"

          # 팀 원본에서 hardening + topic/* 브랜치만 가져온다
          git fetch upstream \
            'refs/heads/hardening:refs/remotes/upstream/hardening' \
            'refs/heads/topic/*:refs/remotes/upstream/topic/*'

          # 미러 레포로 같은 이름 브랜치로 push (--force로 항상 최신 상태 유지)
          git remote add mirror "$MIRROR"
          git push --force mirror 'refs/remotes/upstream/*:refs/heads/*'
